<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Empleo</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#16a34a'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <input type="checkbox" id="menuToggle" class="hidden peer/menu">

    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">

            <a class="flex items-center gap-2 font-bold text-xl">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                Bolsa de Empleo
            </a>

            <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
                <a href="/puestos/buscar-por-caracteristicas" class="hover:underline">Buscar puestos</a>
                <a href="/empresa/registro" class="hover:underline">Registro Empresa</a>
                <a href="/oferente/registro" class="hover:underline">Registro Oferente</a>
                <span class="text-white/70">|</span>
                <a href="/login" class="hover:underline">Login</a>
            </div>

            <label for="menuToggle" class="md:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>

        </div>
    </div>

    <div class="hidden peer-checked/menu:block md:!hidden">
        <div class="flex flex-col px-4 pb-4 gap-3 text-sm">
            <a href="/puestos/buscar-por-caracteristicas" class="hover:text-blue-200">Buscar puestos</a>
            <a href="/empresa/registro" class="hover:text-blue-200">Registro Empresa</a>
            <a href="/oferente/registro" class="hover:text-blue-200">Registro Oferente</a>
            <a href="/login" class="hover:text-blue-200">Login</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

    <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">
            Bolsa de Empleo
        </h1>
        <p class="text-gray-600">
            Últimos 5 puestos públicos
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <div th:each="puesto : ${puestos}"
             class="relative bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow-lg hover:shadow-xl transform hover:scale-105 hover:z-40 transition-all duration-200 p-6 text-white">

            <p class="text-green-100 text-sm"
               th:text="${puesto.empresa.nombre}">
                Empresa
            </p>

            <h2 class="text-xl font-bold mb-2"
                th:text="${puesto.titulo}">
                Título
            </h2>

            <p class="text-lg font-semibold mb-4"
               th:text="'₡ ' + ${#numbers.formatDecimal(puesto.salario, 1, 'COMMA', 0, 'POINT')}">
                Salario
            </p>

            <div class="relative group">

                <button
                        class="w-full bg-white text-green-600 py-2 rounded-lg font-semibold hover:bg-green-50 transition-colors">
                    Ver detalle
                </button>

                <div class="absolute left-0 top-full mt-3 hidden group-hover:block bg-white text-gray-800 border rounded-lg shadow-lg p-4 text-sm w-64 z-50">

                    <h3 class="font-semibold mb-2"
                        th:text="${puesto.titulo}">
                        Título
                    </h3>

                    <ul class="list-disc ml-4 space-y-1">
                        <li th:each="req : ${puesto.requisitos}"
                            th:text="${req.caracteristica.nombre} + ' (nivel ' + ${req.nivel} + ')'">
                            Característica
                        </li>
                    </ul>

                </div>

            </div>

        </div>

    </div>

    <div id="detallePanel"
         class="hidden mt-10 max-w-md bg-white rounded-lg shadow-md p-6">

        <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">

            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6M9 8h6"/>

            </svg>

            Detalles del puesto

        </h3>

        <ul id="detalleContenido" class="text-gray-600 space-y-2">
        </ul>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
