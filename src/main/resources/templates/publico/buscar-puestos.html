<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Puestos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#16a34a'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <input type="checkbox" id="menuToggle" class="hidden peer/menu">

    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">

            <a href="/" class="flex items-center gap-2 font-bold text-xl">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                Bolsa de Empleo
            </a>

            <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
                <a href="/puestos/buscar-por-caracteristicas" class="hover:underline">Buscar puestos</a>
                <a href="/empresa/registro" class="hover:underline">Registro Empresa</a>
                <a href="/oferente/registro" class="hover:underline">Registro Oferente</a>
                <span class="text-white/70">|</span>
                <a href="/login" class="hover:underline">Login</a>
            </div>

            <label for="menuToggle" class="md:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>

        </div>
    </div>

    <div class="hidden peer-checked/menu:block md:!hidden">
        <div class="flex flex-col px-4 pb-4 gap-3 text-sm">
            <a href="/puestos/buscar-por-caracteristicas" class="hover:text-blue-200">Buscar puestos</a>
            <a href="/empresa/registro" class="hover:text-blue-200">Registro Empresa</a>
            <a href="/oferente/registro" class="hover:text-blue-200">Registro Oferente</a>
            <a href="/login" class="hover:text-blue-200">Login</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">

    <div class="bg-white rounded-lg shadow-md p-8 mb-8 max-w-2xl">

        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            Buscar puestos por características
        </h1>

        <form method="get" action="/puestos/buscar-por-caracteristicas">

            <div class="border rounded-lg p-4 mb-6 max-h-60 overflow-y-auto text-sm text-gray-700">

                <div th:each="padre : ${todasCaracteristicas}" th:if="${padre.padre == null}">

                    <div class="flex items-center gap-2 mt-3">
                        <input type="checkbox"
                               class="accent-blue-600"
                               name="caracteristicas"
                               th:value="${padre.id}"
                               th:checked="${seleccionadas != null and seleccionadas.contains(padre.id)}">
                        <span class="font-semibold" th:text="${padre.nombre}"></span>
                    </div>

                    <div th:each="hijo : ${todasCaracteristicas}"
                         th:if="${hijo.padre != null and hijo.padre.id == padre.id}"
                         class="ml-6 flex items-center gap-2 py-1">
                        <input type="checkbox"
                               class="accent-blue-600"
                               name="caracteristicas"
                               th:value="${hijo.id}"
                               th:checked="${seleccionadas != null and seleccionadas.contains(hijo.id)}">
                        <span th:text="${hijo.nombre}"></span>
                    </div>

                </div>

            </div>

            <div class="flex gap-3">
                <button type="submit"
                        class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                    Buscar
                </button>

                <a href="/puestos/buscar-por-caracteristicas"
                   class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg font-semibold hover:bg-gray-300 transition">
                    Limpiar
                </a>
            </div>

        </form>
    </div>

    <div th:if="${resultados != null}" class="mt-10">

        <h2 class="text-2xl font-bold text-gray-800 mb-4">
            Resultados
        </h2>

        <div th:if="${resultados.isEmpty()}" class="text-gray-500">
            No se encontraron puestos con esas características.
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <div th:each="puesto : ${resultados}"
                 class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200 p-6 text-white">

                <p class="text-green-100 text-sm"
                   th:text="${puesto.empresa.nombre}">
                </p>

                <h3 class="text-lg font-bold"
                    th:text="${puesto.titulo}">
                </h3>

                <p class="text-lg font-semibold mt-2"
                   th:text="'₡ ' + ${#numbers.formatDecimal(puesto.salario, 1, 'COMMA', 0, 'POINT')}">
                </p>

            </div>

        </div>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
