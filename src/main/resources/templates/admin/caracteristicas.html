<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Características</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <a href="/" class="font-bold text-xl">Bolsa de Empleo</a>

    <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
      <a href="/admin/dashboard" class="hover:underline">Dashboard</a>
      <a href="/admin/aprobaciones" class="hover:underline">Aprobaciones</a>
      <a href="/admin/empresas" class="hover:underline">Empresas</a>
      <a href="/admin/oferentes" class="hover:underline">Oferentes</a>
      <a href="/admin/caracteristicas" class="hover:underline">Características</a>
      <span class="text-white/70">|</span>
      <a href="/logout" class="hover:underline">Salir</a>
    </div>

  </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-bold mb-4">Lista</h2>

      <ul class="text-gray-700 space-y-2">
        <li th:each="c : ${caracteristicas}">
          <span th:text="${c.nombre}"></span>
          <span class="text-gray-400"
                th:if="${c.padre != null}"
                th:text="' (Padre: ' + ${c.padre.nombre} + ')'"></span>
        </li>
      </ul>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-bold mb-4">Nueva Característica</h2>

      <form method="post" action="/admin/caracteristicas">

        <input type="text" name="nombre" required
               class="w-full border rounded px-3 py-2 mb-3">

        <select name="padreId"
                class="w-full border rounded px-3 py-2 mb-4">
          <option value="">Sin padre</option>
          <option th:each="c : ${caracteristicas}"
                  th:value="${c.id}"
                  th:text="${c.nombre}">
          </option>
        </select>

        <button class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-semibold">
          Guardar
        </button>

      </form>
    </div>

  </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
    <span>Bolsa de Empleo</span>
    <span>Admin Panel</span>
  </div>
</footer>


</body>
</html>
