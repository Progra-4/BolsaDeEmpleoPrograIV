<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin - Empresas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <a href="/" class="font-bold text-xl">Bolsa de Empleo</a>

    <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
      <a href="/admin/dashboard" class="hover:underline">Dashboard</a>
      <a href="/admin/aprobaciones" class="hover:underline">Aprobaciones</a>
      <a href="/admin/empresas" class="hover:underline">Empresas</a>
      <a href="/admin/oferentes" class="hover:underline">Oferentes</a>
      <a href="/admin/caracteristicas" class="hover:underline">Características</a>
      <span class="text-white/70">|</span>
      <a href="/logout" class="hover:underline">Salir</a>
    </div>

  </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

  <div class="bg-white rounded-lg shadow-md p-8 mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">
      Lista de Empresas
    </h1>
    <p class="text-gray-500">
      Gestión de empresas registradas
    </p>
  </div>

  <div class="bg-white rounded-lg shadow-md p-6 overflow-x-auto">

    <table class="w-full text-sm">

      <thead class="border-b text-left text-gray-600">
      <tr>
        <th class="py-2">Nombre</th>
        <th>Correo</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th class="text-right">Acciones</th>
      </tr>
      </thead>

      <tbody>

      <tr th:each="e : ${empresas}" class="border-b last:border-0">

        <td class="py-3 font-semibold text-gray-800" th:text="${e.nombre}"></td>
        <td class="text-gray-600" th:text="${e.correo}"></td>
        <td class="text-gray-600" th:text="${e.telefono}"></td>

        <td>
          <span th:if="${e.aprobada}" class="text-green-600 font-semibold">
            Aprobada
          </span>
          <span th:if="${!e.aprobada}" class="text-yellow-600 font-semibold">
            Pendiente
          </span>
        </td>

        <td class="text-right">

          <form th:action="@{/admin/empresa/rechazar/{id}(id=${e.id})}"
                method="post"
                class="inline">

            <button type="submit"
                    class="text-red-500 hover:text-red-700 text-sm font-semibold">
              Eliminar
            </button>

          </form>

        </td>

      </tr>

      <tr th:if="${empresas.isEmpty()}">
        <td colspan="5" class="text-center text-gray-400 py-6">
          No hay empresas registradas
        </td>
      </tr>

      </tbody>

    </table>

  </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
    <span>Bolsa de Empleo</span>
    <span>Admin Panel</span>
  </div>
</footer>

</body>
</html>
