<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Aprobaciones</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <a href="/admin/dashboard" class="flex items-center gap-2 font-bold text-xl">
      Bolsa de Empleo
    </a>

    <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
      <a href="/admin/empresas" class="hover:underline">Empresas</a>
      <a href="/admin/oferentes" class="hover:underline">Oferentes</a>
      <a href="/admin/caracteristicas" class="hover:underline">Características</a>
      <span class="text-white/70">|</span>
      <a href="/logout" class="hover:underline">Salir</a>
    </div>

  </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

  <div class="bg-white rounded-lg shadow-md p-8 mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Aprobaciones</h1>
    <p class="text-gray-500">Gestión de usuarios pendientes</p>
  </div>

  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-bold mb-4 text-gray-800">Empresas pendientes</h2>

      <div th:if="${empresas.isEmpty()}" class="text-gray-400 text-sm">
        Sin empresas pendientes
      </div>

      <div th:each="e : ${empresas}" class="border-b py-4 flex justify-between items-center">
        <div>
          <p class="font-semibold text-gray-800" th:text="${e.nombre}"></p>
          <p class="text-sm text-gray-500" th:text="${e.correo}"></p>
        </div>

        <div class="flex gap-2">
          <form th:action="@{'/admin/empresa/aprobar/' + ${e.id}}" method="post">
            <button class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">✔</button>
          </form>
          <form th:action="@{'/admin/empresa/rechazar/' + ${e.id}}" method="post">
            <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">✖</button>
          </form>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-bold mb-4 text-gray-800">Oferentes pendientes</h2>

      <div th:if="${oferentes.isEmpty()}" class="text-gray-400 text-sm">
        Sin oferentes pendientes
      </div>

      <div th:each="o : ${oferentes}" class="border-b py-4 flex justify-between items-center">
        <div>
          <p class="font-semibold text-gray-800"
             th:text="${o.nombre + ' ' + o.apellido}"></p>
          <p class="text-sm text-gray-500"
             th:text="${o.correo}"></p>
        </div>

        <div class="flex gap-2">
          <form th:action="@{'/admin/oferente/aprobar/' + ${o.id}}" method="post">
            <button class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">✔</button>
          </form>
          <form th:action="@{'/admin/oferente/rechazar/' + ${o.id}}" method="post">
            <button class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">✖</button>
          </form>
        </div>
      </div>
    </div>

  </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
    <span>Bolsa de Empleo</span>
    <span>Admin Panel</span>
  </div>
</footer>


</body>
</html>
