<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferente - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a class="flex items-center gap-2 font-bold text-xl">Bolsa de Empleo</a>
        <div class="flex items-center gap-4 text-sm">
            <span th:text="${oferente.correo}"></span>
            <a href="/logout" class="bg-gray-700 px-4 py-1.5 rounded-lg">Cerrar sesión</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

    <div class="bg-white rounded-lg shadow-md p-8 mb-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Dashboard</h1>
        <p class="text-gray-600">Administra tu perfil</p>
    </div>

    <div class="grid md:grid-cols-2 gap-6">

        <a href="/oferente/habilidades"
           class="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-lg shadow-lg hover:scale-105 transition">
            <h3 class="text-xl font-bold">Mis habilidades</h3>
        </a>

        <a href="/oferente/curriculum"
           class="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-lg shadow-lg hover:scale-105 transition">
            <h3 class="text-xl font-bold">Mi CV</h3>
        </a>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
