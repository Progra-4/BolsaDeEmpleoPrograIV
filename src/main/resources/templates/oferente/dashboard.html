<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferente - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-black text-gray-300">
    <input type="checkbox" id="menuToggle" class="hidden peer/menu">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-14">
            <a href="/" class="flex items-center gap-2 font-semibold hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                BolsaEmpleo
            </a>
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/oferente/dashboard" class="hover:text-white">Dashboard</a>
                <a href="/oferente/habilidades" class="hover:text-white">Mis habilidades</a>
                <a href="/oferente/curriculum" class="hover:text-white">Mi CV</a>
            </div>
            <div class="hidden md:flex items-center gap-3">
                <span class="text-sm" th:text="${oferente.correo}"></span>
                <a href="/logout"
                   class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded">
                    Salir
                </a>
            </div>
            <label for="menuToggle" class="md:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>
        </div>
    </div>
    <div class="hidden peer-checked/menu:block md:!hidden">
        <div class="flex flex-col px-4 py-3 gap-3 text-sm">
            <a href="/oferente/dashboard" class="hover:text-blue-400">Dashboard</a>
            <a href="/oferente/habilidades" class="hover:text-blue-400">Mis habilidades</a>
            <a href="/oferente/curriculum" class="hover:text-blue-400">Mi CV</a>
            <a href="/logout" class="hover:text-blue-400">Salir</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">

    <h1 class="text-2xl font-bold text-gray-800 mb-1">Oferente - Dashboard</h1>
    <p class="text-gray-500 text-sm mb-6">Administra tus habilidades y tu CV.</p>

    <div class="flex gap-3">
        <a href="/oferente/habilidades"
           class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-sm font-semibold">
            Mis habilidades
        </a>
        <a href="/oferente/curriculum"
           class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 text-sm font-semibold">
            Mi CV
        </a>
    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
