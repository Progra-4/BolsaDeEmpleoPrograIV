<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferente - Mi CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#16a34a'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a class="flex items-center gap-2 font-bold text-xl">Bolsa de Empleo</a>
        <div class="flex items-center gap-4 text-sm">
            <span th:text="${oferente.correo}"></span>
            <a href="/logout" class="bg-gray-700 px-4 py-1.5 rounded-lg">Cerrar sesión</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Mi CV</h1>

    <div th:if="${error}" class="bg-red-100 text-red-700 rounded-lg p-3 mb-6 text-sm" th:text="${error}"></div>

    <div class="grid md:grid-cols-2 gap-6">

        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <span th:if="${curriculum == null}">Subir CV</span>
                <span th:if="${curriculum != null}">Actualizar CV</span>
            </h2>

            <form method="post" action="/oferente/curriculum/subir" enctype="multipart/form-data">
                <input type="file" name="archivo" accept=".pdf" required
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 mb-4">

                <button class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700">
                    <span th:if="${curriculum == null}">Subir</span>
                    <span th:if="${curriculum != null}">Reemplazar</span>
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">CV actual</h2>

            <div th:if="${curriculum == null}" class="text-gray-400">
                No has subido ningún CV todavía.
            </div>

            <div th:if="${curriculum != null}" class="space-y-4">
                <div class="flex items-center gap-3 bg-gray-50 p-3 rounded-lg">
                    <span class="text-gray-700 text-sm" th:text="${curriculum.archivo}"></span>
                </div>

                <a href="/oferente/curriculum/ver"
                   target="_blank"
                   class="block text-center bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700">
                    Ver PDF
                </a>
            </div>
        </div>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
