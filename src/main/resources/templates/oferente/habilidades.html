<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a class="flex items-center gap-2 font-bold text-xl">Bolsa de Empleo</a>
        <div class="flex items-center gap-4 text-sm">
            <span th:text="${oferente.correo}"></span>
            <a href="/logout" class="bg-gray-700 px-4 py-1.5 rounded-lg">Cerrar sesión</a>
        </div>
    </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-12">

    <h1 class="text-3xl font-bold text-gray-800 mb-6">Mis habilidades</h1>

    <div class="grid lg:grid-cols-3 gap-6">

        <div class="bg-white rounded-lg shadow-lg p-6">
            <table class="w-full text-sm">
                <tr th:each="h : ${habilidades}">
                    <td th:text="${h.caracteristica.nombre}"></td>
                    <td th:text="${h.nivel}"></td>
                </tr>
            </table>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <div th:each="sub : ${subcategorias}">
                <a th:text="${sub.nombre}"></a>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-lg p-6">
            <form method="post">
                <select name="caracteristicaId" class="w-full border rounded-lg p-2 mb-3"></select>
                <input type="number" class="w-full border rounded-lg p-2 mb-3">
                <button class="w-full bg-blue-600 text-white py-2 rounded-lg">Agregar</button>
            </form>
        </div>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
