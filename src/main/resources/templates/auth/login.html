<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#16a34a'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="flex justify-between items-center">

            <a href="/" class="flex items-center gap-2 font-bold text-xl">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                Bolsa de Empleo
            </a>

            <div class="hidden md:flex items-center gap-6 text-sm font-semibold">
                <a href="/puestos/buscar-por-caracteristicas" class="hover:underline">Buscar puestos</a>
                <a href="/empresa/registro" class="hover:underline">Registro Empresa</a>
                <a href="/oferente/registro" class="hover:underline">Registro Oferente</a>
                <span class="text-white/70">|</span>
                <a href="/login" class="hover:underline">Login</a>
            </div>

        </div>
    </div>
</nav>

<main class="flex-grow flex items-center justify-center px-4">

    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">

        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">
            Iniciar sesión
        </h1>

        <div class="flex justify-center mb-6">
            <div class="bg-blue-100 p-4 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-600"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M5.121 17.804A8.966 8.966 0 0112 15c2.21 0 4.21.794 5.879 2.104M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
        </div>

        <div th:if="${error}"
             class="bg-red-100 text-red-700 rounded-lg p-3 mb-4 text-sm text-center"
             th:text="${error}">
        </div>

        <form method="post" action="/login">

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Usuario</label>
                <input type="text" name="usuario"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="correo o identificación">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" name="clave"
                       class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Entrar
            </button>

        </form>

    </div>

</main>

<footer class="bg-gray-900 text-gray-300 text-sm mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
