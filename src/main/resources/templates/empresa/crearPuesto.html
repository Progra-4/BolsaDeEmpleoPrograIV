<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Puesto - Empresa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex flex-col">
        <!-- Navbar -->
        <nav class="bg-blue-600 text-white shadow-lg">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <a href="/empresa/dashboard" class="flex items-center space-x-2 hover:opacity-80 transition">
                        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                        </svg>
                        <h1 class="text-xl font-bold">Bolsa de Empleo</h1>
                    </a>
                </div>
                <div class="text-right">
                    <p class="font-semibold" th:text="${empresa.nombre}">Empresa</p>
                    <a href="/logout" class="text-sm hover:underline">Cerrar sesión</a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="flex-1 max-w-2xl w-full mx-auto px-4 py-8">
            <!-- Header -->
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-2">Crear Nuevo Puesto</h2>
                <p class="text-gray-600">Completa el formulario para publicar una nueva oferta de empleo</p>
            </div>

            <!-- Form -->
            <form th:action="@{/empresa/puestos}" method="POST" class="bg-white rounded-lg shadow-md p-8">

                <!-- Título -->
                <div class="mb-6">
                    <label for="titulo" class="block text-sm font-semibold text-gray-700 mb-2">Título del Puesto *</label>
                    <input type="text" id="titulo" name="titulo" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           placeholder="Ej: Desarrollador Senior Java">
                </div>

                <!-- Descripción -->
                <div class="mb-6">
                    <label for="descripcion" class="block text-sm font-semibold text-gray-700 mb-2">Descripción *</label>
                    <textarea id="descripcion" name="descripcion" rows="6" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                              placeholder="Descripción detallada del puesto, responsabilidades, requisitos..."></textarea>
                </div>

                <!-- Salario -->
                <div class="mb-6">
                    <label for="salario" class="block text-sm font-semibold text-gray-700 mb-2">Salario (USD)</label>
                    <input type="number" id="salario" name="salario" step="0.01" min="0"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           placeholder="Ej: 5000.00">
                </div>

                <!-- Tipo de Publicación -->
                <div class="mb-6">
                    <label for="tipoPublicacion" class="block text-sm font-semibold text-gray-700 mb-2">Tipo de Publicación *</label>
                    <select id="tipoPublicacion" name="tipoPublicacion" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                        <option value="">Seleccionar...</option>
                        <option value="PUBLICO">Público</option>
                        <option value="PRIVADO">Privado</option>
                    </select>
                </div>

                <!-- Características -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Características Requeridas</h3>
                    <p class="text-gray-600 text-sm mb-4">Selecciona mínimo 3 habilidades y su nivel requerido</p>

                    <div id="caracteristicas-container" class="space-y-4">
                        <!-- Template para características -->
                        <div class="caracteristica-row grid grid-cols-2 gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Característica</label>
                                <select name="caracteristicas" required
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option th:each="caract : ${caracteristicas}" th:value="${caract.id}" th:text="${caract.nombre}">
                                        Característica
                                    </option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Nivel Requerido</label>
                                <select name="niveles" required
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option value="1">Básico (1)</option>
                                    <option value="2">Intermedio (2)</option>
                                    <option value="3">Avanzado (3)</option>
                                    <option value="4">Experto (4)</option>
                                    <option value="5">Maestría (5)</option>
                                </select>
                            </div>
                        </div>

                        <div class="caracteristica-row grid grid-cols-2 gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Característica</label>
                                <select name="caracteristicas"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option th:each="caract : ${caracteristicas}" th:value="${caract.id}" th:text="${caract.nombre}">
                                        Característica
                                    </option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Nivel Requerido</label>
                                <select name="niveles"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option value="1">Básico (1)</option>
                                    <option value="2">Intermedio (2)</option>
                                    <option value="3">Avanzado (3)</option>
                                    <option value="4">Experto (4)</option>
                                    <option value="5">Maestría (5)</option>
                                </select>
                            </div>
                        </div>

                        <div class="caracteristica-row grid grid-cols-2 gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Característica</label>
                                <select name="caracteristicas"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option th:each="caract : ${caracteristicas}" th:value="${caract.id}" th:text="${caract.nombre}">
                                        Característica
                                    </option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Nivel Requerido</label>
                                <select name="niveles"
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
                                    <option value="">Seleccionar...</option>
                                    <option value="1">Básico (1)</option>
                                    <option value="2">Intermedio (2)</option>
                                    <option value="3">Avanzado (3)</option>
                                    <option value="4">Experto (4)</option>
                                    <option value="5">Maestría (5)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="agregar-caracteristica" class="mt-4 px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-semibold flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.707-10.707a1 1 0 00-1.414-1.414L9 9.586V7a1 1 0 10-2 0v2.586L5.707 8.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3z" clip-rule="evenodd"></path>
                        </svg>
                        <span>Agregar otra característica</span>
                    </button>
                </div>

                <!-- Buttons -->
                <div class="flex justify-between pt-6 border-t border-gray-200">
                    <a href="/empresa/puestos" class="px-6 py-2 border border-gray-300 text-gray-800 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
                        Cancelar
                    </a>
                    <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition-colors flex items-center space-x-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        <span>Publicar Puesto</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const agregarBtn = document.getElementById('agregar-caracteristica');
        const container = document.getElementById('caracteristicas-container');

        agregarBtn.addEventListener('click', function() {
            const template = container.querySelector('.caracteristica-row');
            const nuevo = template.cloneNode(true);

            // Limpiar valores
            nuevo.querySelectorAll('select').forEach(select => {
                select.value = '';
            });

            container.appendChild(nuevo);
        });
    </script>
</body>
</html>
