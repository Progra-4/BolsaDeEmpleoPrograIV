<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Empresa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-black text-gray-300">
    <input type="checkbox" id="menuToggle" class="hidden peer/menu">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-14">
            <a href="/" class="flex items-center gap-2 font-semibold hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                BolsaEmpleo
            </a>
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/puestos/buscar-por-caracteristicas" class="hover:text-white">Buscar puestos</a>
                <a href="/empresa/registro" class="hover:text-white">Registro Empresa</a>
                <a href="/oferente/registro" class="hover:text-white">Registro Oferente</a>
            </div>
            <div class="hidden md:block">
                <a href="/login" class="text-sm hover:text-white">Login</a>
            </div>
            <label for="menuToggle" class="md:hidden cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>
        </div>
    </div>
    <div class="hidden peer-checked/menu:block md:!hidden">
        <div class="flex flex-col px-4 py-3 gap-3 text-sm">
            <a href="/puestos/buscar-por-caracteristicas" class="hover:text-blue-400">Buscar puestos</a>
            <a href="/empresa/registro" class="hover:text-blue-400">Registro Empresa</a>
            <a href="/oferente/registro" class="hover:text-blue-400">Registro Oferente</a>
            <a href="/login" class="hover:text-blue-400">Login</a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<main class="flex-grow flex items-center justify-center py-8 px-4">
    <div class="bg-white rounded-lg shadow p-8 w-full max-w-lg">

        <h1 class="text-2xl font-bold text-gray-800 mb-2">Registro de Empresa</h1>
        <p class="text-gray-500 text-sm mb-6">Complete el formulario. Un administrador aprobará su registro.</p>

        <!-- MENSAJE DE EXITO -->
        <div th:if="${exito}"
             class="bg-green-100 text-green-700 text-sm rounded p-3 mb-4"
             th:text="${exito}">
        </div>

        <!-- MENSAJE DE ERROR -->
        <div th:if="${error}"
             class="bg-red-100 text-red-700 text-sm rounded p-3 mb-4"
             th:text="${error}">
        </div>

        <form method="post" action="/empresa/registro">

            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Nombre de la empresa</label>
                <input type="text" name="nombre" required
                       class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Ej: TechCR S.A.">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Localización</label>
                <input type="text" name="localizacion"
                       class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Ej: San José, Costa Rica">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Correo electrónico</label>
                <input type="email" name="correo" required
                       class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="correo@empresa.com">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Teléfono</label>
                <input type="text" name="telefono"
                       class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Ej: 2200-1111">
            </div>

            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Descripción</label>
                <textarea name="descripcion" rows="3"
                          class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                          placeholder="Breve descripción de la empresa"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">Contraseña</label>
                <input type="password" name="clave" required
                       class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                       placeholder="Cree una contraseña">
            </div>

            <button type="submit"
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600 text-sm font-semibold">
                Registrarse
            </button>

        </form>
    </div>
</main>

<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-300 text-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
        <span>Bolsa de Empleo</span>
        <span>Contacto info@bolsaempleo.local</span>
    </div>
</footer>

</body>
</html>
