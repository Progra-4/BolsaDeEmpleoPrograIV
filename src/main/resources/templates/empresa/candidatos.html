<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-blue-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/empresa/dashboard" class="flex items-center space-x-2 hover:opacity-80 transition">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
            </svg>
            <h1 class="text-xl font-bold">Bolsa de Empleo</h1>
        </a>
        <div class="text-right">
            <p class="font-semibold" th:text="${empresa.nombre}">Empresa</p>
            <a href="/logout" class="text-sm hover:underline">Cerrar sesión</a>
        </div>
    </div>
</nav>

<main class="flex-1 max-w-3xl w-full mx-auto px-4 py-8">

    <a href="/empresa/puestos" class="text-sm text-blue-500 hover:underline mb-4 inline-block">
        ← Volver
    </a>

    <h1 class="text-3xl font-bold text-gray-800 mb-6">
        Candidatos
    </h1>

    <div th:if="${not #lists.isEmpty(candidatos)}" class="space-y-4">

        <div th:each="c : ${candidatos}" class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">

            <div class="flex justify-between items-center">
                <div>
                    <p class="font-semibold text-gray-800"
                       th:text="${c.nombre + ' ' + c.apellido}">Nombre Apellido</p>
                    <p class="text-sm text-gray-500"
                       th:text="${c.correo}">correo@ejemplo.com</p>
                </div>
                <a th:href="'/empresa/candidatos/' + ${c.id}"
                   class="text-sm text-blue-500 hover:underline font-semibold">
                    Ver perfil
                </a>
            </div>

            <div class="mt-3 text-sm text-gray-600 grid md:grid-cols-3 gap-2">
                <span th:text="${c.telefono}">+506 0000 0000</span>
                <span th:text="${c.residencia}">Residencia</span>
                <span th:text="${c.identificacion}">ID</span>
            </div>

        </div>

    </div>

    <div th:unless="${not #lists.isEmpty(candidatos)}"
         class="bg-white p-6 rounded-lg shadow text-center text-gray-400 mt-4">
        No hay candidatos
    </div>

</main>

</body>
</html>
